{% load widget_tweaks %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login • GymFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg,#eef2ff,#f8fafc);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    .login-card{
      border:0;
      border-radius:18px;
    }

    .brand{
      font-weight:700;
      font-size:22px;
      color:#2563eb;
    }

    .form-control{
      height:48px;
      border-radius:10px;
    }

    .btn-login{
      height:48px;
      border-radius:10px;
      font-weight:600;
    }

    .muted-link{
      font-size:14px;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-6 col-lg-4">

        <div class="card login-card shadow-lg">
          <div class="card-body p-4 p-md-5">

            <!-- Brand -->
            <div class="text-center mb-4">
              <div class="brand">GymFlow</div>
              <div class="text-muted small">Manage your gym smarter</div>
            </div>

            <!-- Title -->
            <h5 class="text-center mb-4">Welcome Back 👋</h5>

            <!-- Form -->
            <form method="post">
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label">Username</label>
                
                {{ form.username|add_class:"form-control" }}


              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password|add_class:"form-control" }}
              </div>

              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember">
                  <label class="form-check-label small" for="remember">
                    Remember me
                  </label>
                </div>

                <a href="#" class="muted-link">Forgot password?</a>
              </div>

              <button class="btn btn-primary w-100 btn-login">
                Login
              </button>
            </form>

          </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-3 small text-muted">
          © 2026 GymFlow. All rights reserved.
        </div>

      </div>
    </div>
  </div>

</body>
</html>
