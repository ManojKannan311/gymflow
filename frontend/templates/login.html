{% load widget_tweaks %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Login • GymFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

   <!-- Bootstrap 5 CSS -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

   <!-- Bootstrap Icons -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

   <!-- jQuery -->
   <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    .login-card {
      border: 0;
      border-radius: 18px;
    }

    .brand {
      font-weight: 700;
      font-size: 22px;
      color: #2563eb;
    }

    .form-control {
      height: 48px;
      border-radius: 10px;
    }

    .btn-login {
      height: 48px;
      border-radius: 10px;
      font-weight: 600;
    }

    .muted-link {
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-6 col-lg-4">

        <div class="card login-card shadow-lg">
          <div class="card-body p-4 p-md-5">

            <!-- Brand -->
            <div class="text-center mb-4">
              {% if messages %}
              {% for message in messages %}
              <div
                class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm"
                role="alert">
                {{ message }}
              </div>
              {% endfor %}
              {% endif %}
              <div class="brand">GymFlow</div>
              <div class="text-muted small">Manage your gym smarter</div>
            </div>

            <!-- Title -->
            <h5 class="text-center mb-4">Welcome Back 👋</h5>

            <!-- Form -->
            <form method="post" action="{% url 'login' %}">
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
              </div>

              <button type="submit" class="btn btn-primary w-100 btn-login">
                Login
              </button>
            </form>

          </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-3 small text-muted">
          © 2026 GymFlow. All rights reserved.
        </div>

      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    $(document).ready(function () {

      setTimeout(function () {
          $(".alert").slideUp("slow", function () {
              $(this).alert('close');   // fully remove from DOM
          });
      }, 3000); // 5000ms = 5 sec

  });

  </script>

</body>

</html>
