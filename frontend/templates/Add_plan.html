{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container-fluid mt-4">
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm"
        role="alert">
        {{ message }}
    </div>
    {% endfor %}
{% endif %}


    <div class="d-flex justify-content-between align-items-center mb-4 shadow-sm"
        style="background-color: white;padding:20px;border-radius: 10px;">
        <h5 class="fw-semibold mb-0">Launch plans<span>
                <p class="text-muted small mb-0" style="font-size: 14px;">Set up and manage your gym subscription plans.
                </p>
            </span></h5>

        <a href="{% url 'plans' %}" class="btn btn-outline-primary btn-sm">
            View plans
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-12 col-md-10">
            <div class="card shadow-sm border-0 rounded-3 pt-3 pb-3">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <!-- ================= BRANCH INFO ================= -->
                        <h6 class="text-uppercase fw-bold text-secondary mb-3">Branch Info</h6>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label small fw-semibold text-muted">
                                    Branch <span class="text-danger">*</span>
                                </label>
                                <select class="form-select" name="branch" id="branch_id" required>
                                    <option value="">Select Branch</option>
                                    {% for branch in add_new %}
                                    <option value="{{ branch.id }}">{{ branch.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label small fw-semibold text-muted">
                                    Plan Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="Plan_name" class="form-control" placeholder="Plan name"
                                    required>
                            </div>
                            <!-- <hr class="my-2"> -->

                            <!-- ================= MEMBERSHIP INFO ================= -->
                            <h6 class="text-uppercase fw-bold text-secondary mb-3 mt-4">Plan Duration</h6>

                            <div class="col-md-6 mb-4">
                                <label class="form-label small fw-semibold text-muted">
                                    Plan duration <span class="text-danger">*</span>
                                </label>
                                <input type="number" name="Plan_duration" class="form-control" placeholder="Number of days"
                                    required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label small fw-semibold text-muted">
                                    Amount (₹) <span class="text-danger">*</span>
                                </label>
                                <input type="number" name="Plan_amount" class="form-control bg-light"
                                    placeholder="Plan Amount " id="price">
                            </div>

                        </div>
                        <!-- <div class="col-md-6 mb-4">
                            <label class="form-label small fw-semibold text-muted">
                                Amount (₹) <span class="text-danger">*</span>
                            </label>
                            <input type="number" name="Plan_amount" class="form-control bg-light"
                                placeholder="Plan Amount " id="price">
                        </div> -->
                        <!-- ================= ACTIONS ================= -->
                        <div class="row mt-2">
                            <div class="col-12 d-flex justify-content-end gap-2">
                                <button class="btn btn-primary px-4 shadow-sm">
                                    <i class="bi bi-check-circle me-1"></i>
                                    Activate Plan
                                </button>
                                <button type="reset" class="btn btn-light border">
                                    Reset
                                </button>
                            </div>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
<script>
    $(document).ready(function () {

        setTimeout(function () {
            $(".alert").slideUp("slow", function () {
                $(this).alert('close');   // fully remove from DOM
            });
        }, 3000); // 5000ms = 5 sec
    
    });
</script>
{% endblock %}
